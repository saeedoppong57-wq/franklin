# ===========================================================================
# Franklin Yeboah portfolio - nginx site config
# ---------------------------------------------------------------------------
# 1. Copy this file to your server:  /etc/nginx/sites-available/franklin
# 2. Enable it:   ln -s /etc/nginx/sites-available/franklin /etc/nginx/sites-enabled/
# 3. Edit the `root` path below to wherever you upload this project.
# 4. Run the fix-permissions commands (see fix-nginx-permissions.sh).
# 5. Test & reload:  nginx -t  &&  systemctl reload nginx
# ===========================================================================

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # Point this at the folder that contains index.html, /images and /videos
    root /var/www/franklin;
    index index.html;

    # Security: don't expose hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Long cache for static media, with version-busting via query string
    location ~* \.(jpg|jpeg|png|gif|mp4|webm|css|js|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ----- Streaming media (prevents ERR_CONTENT_LENGTH_MISMATCH) -----
    # If nginx proxies these files from a backend (Node/PHP), buffering the
    # response into proxy_temp is what fails (bad perms / full disk) and
    # truncates the stream. Turn buffering OFF so bytes are streamed live
    # and no Content-Length vs bytes mismatch can occur.
    location /videos/ {
        # For STATIC files served straight from disk, this is enough:
        mp4;
        mp4_buffer_size 1m;
        mp4_max_buffer_size 20m;

        # Uncomment the block below ONLY if /videos/ is proxied to a backend:
        # proxy_pass http://127.0.0.1:3000;
        # proxy_http_version 1.1;
        # proxy_set_header Connection "";
        # proxy_buffering off;          # <-- key fix for the mismatch error
        # proxy_request_buffering off;
        # proxy_set_header Range $http_range;
        # proxy_set_header If-Range $http_if_range;
    }
}
